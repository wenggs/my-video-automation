<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video Automation MVP - Jobs</title>
    <style>
      body { font-family: Arial, Helvetica, sans-serif; padding: 16px; background: #fafafa; }
      h1 { font-size: 18px; margin: 0 0 12px; }
      .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin: 10px 0; }
      button { padding: 8px 12px; border: 1px solid #ccc; background: #fff; border-radius: 6px; cursor: pointer; }
      button[disabled] { opacity: 0.45; cursor: not-allowed; }
      table { width: 100%; border-collapse: collapse; background: white; }
      th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; vertical-align: top; }
      code { background: #f3f3f3; padding: 2px 6px; border-radius: 6px; }
      .muted { color: #666; font-size: 12px; }
      .status { font-weight: bold; }
      .card { border: 1px solid #eee; border-radius: 10px; padding: 12px; background: white; }
      .err { color: #b00020; white-space: pre-wrap; }
      .ok { color: #0b6; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <h1>Video Automation MVP - Jobs</h1>

    <div class="row">
      <button id="btnRefresh">Refresh</button>
      <label class="muted">Filter
        <select id="fStatus" style="margin-left:4px;">
          <option value="all">all</option>
          <option value="queued">queued</option>
          <option value="running">running</option>
          <option value="failed">failed</option>
          <option value="succeeded">succeeded</option>
          <option value="cancelled">cancelled</option>
        </select>
      </label>
      <label class="muted"><input type="checkbox" id="fAutoPoll" checked /> auto refresh (2s)</label>
      <span class="muted">UI uses backend stubs for upload (open/confirm transitions only).</span>
    </div>

    <div class="card" style="margin-top: 12px;">
      <div style="font-weight:bold; margin-bottom:8px;">Workspace config</div>
      <div class="muted">input_root: <code id="cfgInputRoot">-</code></div>
      <div class="muted">data_root: <code id="cfgDataRoot">-</code></div>
    </div>

    <div class="card" style="margin-top: 12px;">
      <div style="font-weight:bold; margin-bottom:8px;">Create job</div>
      <div class="row">
        <label class="muted">video_asset_id <input id="fVideoAssetId" style="width:200px;" value="demo-video-001" /></label>
        <label class="muted">words_relative_path <input id="fWordsPath" style="width:220px;" value="transcript_words.json" /></label>
        <label class="muted">video_relative_path <input id="fVideoPath" style="width:220px;" placeholder="optional, e.g. _smoke_sample.mp4" /></label>
        <label class="muted">quality
          <select id="fAsrQuality" style="margin-left:4px;">
            <option value="fast">fast</option>
            <option value="standard" selected>standard</option>
            <option value="high">high</option>
          </select>
        </label>
        <label class="muted">asr model <input id="fAsrModel" style="width:110px;" value="small" /></label>
        <label class="muted">language <input id="fAsrLanguage" style="width:60px;" value="zh" /></label>
        <button id="btnAutoLyrics">Auto-generate lyrics</button>
        <button id="btnRetryAutoLyrics">Retry auto lyrics</button>
        <button id="btnCancelAutoLyrics">Cancel auto lyrics</button>
        <button id="btnCreateJob">Create</button>
      </div>
      <div class="muted">Only relative paths under server input_root are allowed.</div>
      <div class="muted">current auto request_id: <code id="autoRequestId">-</code></div>
      <div id="autoInfo" class="muted" style="margin-top:6px;"></div>
    </div>

    <div id="msg" class="muted"></div>

    <div class="card" style="margin-top: 12px;">
      <table>
        <thead>
          <tr>
            <th style="width: 180px;">job</th>
            <th style="width: 120px;">status</th>
            <th>artifacts / douyin publish</th>
            <th style="width: 220px;">actions</th>
          </tr>
        </thead>
        <tbody id="jobsBody"></tbody>
      </table>
    </div>

    <script>
      const API_BASE = '/api/v1';
      const LS_KEY = 'video-automation-ui-v1';
      let autoTimer = null;
      let autoInFlight = false;

      function newRequestId() {
        const now = Date.now().toString(36);
        const rand = Math.random().toString(36).slice(2, 10);
        return `asr-${now}-${rand}`;
      }

      function setAutoUiState() {
        const btnAuto = document.getElementById('btnAutoLyrics');
        const btnRetry = document.getElementById('btnRetryAutoLyrics');
        const btnCancel = document.getElementById('btnCancelAutoLyrics');
        btnAuto.disabled = autoInFlight;
        btnRetry.disabled = autoInFlight;
        btnCancel.disabled = !autoInFlight || !window.__lastAutoPayload || !window.__lastAutoPayload.request_id;
      }

      function loadPrefs() {
        try {
          const raw = localStorage.getItem(LS_KEY);
          return raw ? JSON.parse(raw) : {};
        } catch (_) {
          return {};
        }
      }

      function savePrefs() {
        try {
          const prefs = {
            videoAssetId: document.getElementById('fVideoAssetId').value || '',
            wordsPath: document.getElementById('fWordsPath').value || '',
            videoPath: document.getElementById('fVideoPath').value || '',
            asrQuality: document.getElementById('fAsrQuality').value || 'standard',
            asrModel: document.getElementById('fAsrModel').value || 'small',
            asrLanguage: document.getElementById('fAsrLanguage').value || 'zh',
            lastAutoPayload: window.__lastAutoPayload || null,
            status: document.getElementById('fStatus').value || 'all',
            autoPoll: !!document.getElementById('fAutoPoll').checked,
          };
          localStorage.setItem(LS_KEY, JSON.stringify(prefs));
        } catch (_) {
          // non-fatal
        }
      }

      function applyPrefs() {
        const prefs = loadPrefs();
        if (prefs.videoAssetId) document.getElementById('fVideoAssetId').value = String(prefs.videoAssetId);
        if (prefs.wordsPath) document.getElementById('fWordsPath').value = String(prefs.wordsPath);
        if (prefs.videoPath) document.getElementById('fVideoPath').value = String(prefs.videoPath);
        if (prefs.asrQuality) document.getElementById('fAsrQuality').value = String(prefs.asrQuality);
        if (prefs.asrModel) document.getElementById('fAsrModel').value = String(prefs.asrModel);
        if (prefs.asrLanguage) document.getElementById('fAsrLanguage').value = String(prefs.asrLanguage);
        if (prefs.lastAutoPayload) window.__lastAutoPayload = prefs.lastAutoPayload;
        if (prefs.status) document.getElementById('fStatus').value = String(prefs.status);
        if (typeof prefs.autoPoll === 'boolean') document.getElementById('fAutoPoll').checked = prefs.autoPoll;
      }

      function qualityPreset(name) {
        if (name === 'fast') return { model: 'tiny', beam_size: 1, vad_filter: true };
        if (name === 'high') return { model: 'medium', beam_size: 8, vad_filter: true };
        return { model: 'small', beam_size: 5, vad_filter: true };
      }

      function showAutoInfo(res) {
        const info = document.getElementById('autoInfo');
        const details = (res && res.auto_generate && res.auto_generate.details) ? res.auto_generate.details : {};
        const elapsed = details.elapsed_sec != null ? `${details.elapsed_sec}s` : '-';
        const segs = details.segments != null ? String(details.segments) : '-';
        const model = details.model || '-';
        const beam = details.beam_size != null ? String(details.beam_size) : '-';
        info.textContent = `auto details: model=${model}, segments=${segs}, elapsed=${elapsed}, beam=${beam}`;
        const rid = (res && res.auto_generate && res.auto_generate.request_id) ? String(res.auto_generate.request_id) : (window.__lastAutoPayload && window.__lastAutoPayload.request_id ? String(window.__lastAutoPayload.request_id) : '-');
        document.getElementById('autoRequestId').textContent = rid;
      }

      function shortId(id) {
        if (!id) return '';
        return String(id).slice(0, 8) + '…';
      }

      function escapeHtml(v) {
        return String(v || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function toAttrJson(obj) {
        return escapeHtml(JSON.stringify(obj || {}));
      }

      async function fetchJson(url, opts) {
        const res = await fetch(url, opts);
        const text = await res.text();
        const json = text ? JSON.parse(text) : {};
        if (!res.ok) {
          const err = json && json.error ? json.error : { code: 'HTTP_' + res.status, message: text };
          throw new Error(err.code + ': ' + err.message);
        }
        return json;
      }

      async function loadJobs() {
        const data = await fetchJson(API_BASE + '/jobs?limit=20');
        return data.items || [];
      }

      async function loadConfig() {
        return fetchJson(API_BASE + '/config');
      }

      function renderJob(job) {
        const artifacts = job.artifacts || {};
        const publish = job.publish || {};
        const douyin = publish.douyin || {};
        const douyinState = douyin.state || '';

        const hasVideo = Boolean(artifacts.douyin_vertical);
        const canPrepare = job.status === 'succeeded' && hasVideo && (!douyinState || douyinState === 'not_prepared' || douyinState === 'prepare_failed' || douyinState === 'upload_prepared_manual');
        const canConfirm = douyinState === 'upload_prepared';

        const preparedUrl = douyin.draft_url ? String(douyin.draft_url) : '';
        const videoUrl = `${API_BASE}/jobs/${job.id}/artifacts/douyin_vertical`;
        const err = douyin.error || null;
        const fallbackErr = (douyin.prepare_details && douyin.prepare_details.fallback_error) ? douyin.prepare_details.fallback_error : null;
        const runError = job.error || null;
        const runErrorJson = runError ? escapeHtml(JSON.stringify(runError, null, 2)) : '';
        const prepareErrorJson = err ? escapeHtml(JSON.stringify(err, null, 2)) : '';

        return `
          <tr>
            <td>
              <div><span class="status">${shortId(job.id)}</span></div>
              <div class="muted">${job.current_step || ''}</div>
            </td>
            <td><span class="status">${job.status || ''}</span></td>
            <td>
              <div><b>douyin_vertical:</b> ${hasVideo ? '<code>yes</code>' : '<code>missing</code>'}</div>
              ${hasVideo ? `<div style="margin-top:6px;"><a href="${videoUrl}" target="_blank">Open video</a> · <a href="${videoUrl}" download>Download</a></div>` : ''}
              <div><b>publish.douyin:</b> <code>${douyinState || '-'}</code></div>
              ${preparedUrl ? `<div style="margin-top:6px;"><a href="${preparedUrl}" target="_blank">Open prepared draft</a></div>` : ''}
              ${fallbackErr ? `<div class="muted" style="margin-top:6px;">fallback: <code>${fallbackErr.code || ''}</code> ${fallbackErr.message || ''}</div>` : ''}
              ${err ? `<div class="err" style="margin-top:6px;">prepare failed: ${err.code || ''} ${err.message || ''}</div>` : ''}
              ${runError ? `<details style="margin-top:6px;"><summary class="err">job error details</summary><pre class="err" style="margin:6px 0 0;">${runErrorJson}</pre><button style="margin-top:6px;" onclick='window.__copyJson("${job.id}","job", "${toAttrJson(runError)}")'>Copy job error JSON</button></details>` : ''}
              ${err ? `<details style="margin-top:6px;"><summary class="err">prepare error details</summary><pre class="err" style="margin:6px 0 0;">${prepareErrorJson}</pre><button style="margin-top:6px;" onclick='window.__copyJson("${job.id}","prepare", "${toAttrJson(err)}")'>Copy prepare error JSON</button></details>` : ''}
            </td>
            <td>
              <div class="row" style="margin:0;">
                <button ${canPrepare ? '' : 'disabled'} onclick="window.__prepare('${job.id}')">Prepare upload</button>
                <button ${canConfirm ? '' : 'disabled'} onclick="window.__confirm('${job.id}')">Confirm publish</button>
              </div>
              <div class="muted" style="margin-top:6px;">
                <a href="${API_BASE}/jobs/${job.id}/logs?tail=80" target="_blank">logs</a>
              </div>
            </td>
          </tr>
        `;
      }

      async function refresh() {
        const msg = document.getElementById('msg');
        msg.textContent = 'Loading...';
        try {
          const [cfg, jobs] = await Promise.all([loadConfig(), loadJobs()]);
          document.getElementById('cfgInputRoot').textContent = String(cfg.input_root || '-');
          document.getElementById('cfgDataRoot').textContent = String(cfg.data_root || '-');
          const statusFilter = String(document.getElementById('fStatus').value || 'all');
          const filtered = statusFilter === 'all' ? jobs : jobs.filter((j) => String(j.status || '') === statusFilter);
          const body = document.getElementById('jobsBody');
          body.innerHTML = filtered.map(renderJob).join('');
          msg.textContent = `OK (${filtered.length}/${jobs.length})`;
          msg.className = 'muted';
        } catch (e) {
          msg.textContent = 'Error: ' + e.message;
          msg.className = 'err';
        }
      }

      function setupAutoRefresh() {
        if (autoTimer) {
          clearInterval(autoTimer);
          autoTimer = null;
        }
        const enabled = document.getElementById('fAutoPoll').checked;
        savePrefs();
        if (enabled) autoTimer = setInterval(refresh, 2000);
      }

      window.__prepare = async function(jobId) {
        const msg = document.getElementById('msg');
        msg.textContent = 'Preparing...';
        try {
          await fetchJson(API_BASE + `/jobs/${jobId}/publish/douyin/prepare`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json; charset=utf-8' },
            body: JSON.stringify({}),
          });
          msg.textContent = 'Prepare request completed.';
          msg.className = 'ok';
          await refresh();
        } catch (e) {
          msg.textContent = 'Prepare failed: ' + e.message;
          msg.className = 'err';
        }
      };

      window.__confirm = async function(jobId) {
        const msg = document.getElementById('msg');
        msg.textContent = 'Confirming...';
        const postId = window.prompt('Douyin post id (optional):', '') || '';
        const publishedUrl = window.prompt('Published URL (optional):', '') || '';
        try {
          await fetchJson(API_BASE + `/jobs/${jobId}/publish/douyin/confirm`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json; charset=utf-8' },
            body: JSON.stringify({ platform_post_id: postId.trim(), published_url: publishedUrl.trim() }),
          });
          msg.textContent = 'Published confirmed.';
          msg.className = 'ok';
          await refresh();
        } catch (e) {
          msg.textContent = 'Confirm failed: ' + e.message;
          msg.className = 'err';
        }
      };

      async function createJob() {
        const msg = document.getElementById('msg');
        const videoAssetId = String(document.getElementById('fVideoAssetId').value || '').trim();
        const wordsRelativePath = String(document.getElementById('fWordsPath').value || '').trim();
        const videoRelativePath = String(document.getElementById('fVideoPath').value || '').trim();
        if (!videoAssetId) {
          msg.textContent = 'Create failed: video_asset_id is required.';
          msg.className = 'err';
          return;
        }
        msg.textContent = 'Creating job...';
        msg.className = 'muted';
        const body = { video_asset_id: videoAssetId, words_relative_path: wordsRelativePath || 'transcript_words.json' };
        if (videoRelativePath) body.video_relative_path = videoRelativePath;
        savePrefs();
        try {
          const res = await fetchJson(API_BASE + '/jobs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json; charset=utf-8' },
            body: JSON.stringify(body),
          });
          msg.textContent = `Job created: ${shortId(res.id)} (${res.status || 'queued'})`;
          msg.className = 'ok';
          await refresh();
        } catch (e) {
          msg.textContent = 'Create failed: ' + e.message;
          msg.className = 'err';
        }
      }

      async function autoGenerateLyrics() {
        const msg = document.getElementById('msg');
        const videoAssetId = String(document.getElementById('fVideoAssetId').value || '').trim();
        const videoRelativePath = String(document.getElementById('fVideoPath').value || '').trim();
        const quality = String(document.getElementById('fAsrQuality').value || 'standard').trim() || 'standard';
        const preset = qualityPreset(quality);
        const modelRaw = String(document.getElementById('fAsrModel').value || '').trim();
        const model = modelRaw || preset.model;
        const language = String(document.getElementById('fAsrLanguage').value || 'zh').trim() || 'zh';
        if (!videoAssetId) {
          msg.textContent = 'Auto-generate failed: video_asset_id is required.';
          msg.className = 'err';
          return;
        }
        if (!videoRelativePath) {
          msg.textContent = 'Auto-generate failed: video_relative_path is required.';
          msg.className = 'err';
          return;
        }
        msg.textContent = 'Auto-generating lyrics...';
        msg.className = 'muted';
        savePrefs();
        autoInFlight = true;
        setAutoUiState();
        try {
          const requestId = newRequestId();
          const reqBody = {
            request_id: requestId,
            video_relative_path: videoRelativePath,
            model,
            language,
            beam_size: preset.beam_size,
            vad_filter: preset.vad_filter,
          };
          window.__lastAutoPayload = { video_asset_id: videoAssetId, ...reqBody };
          document.getElementById('autoRequestId').textContent = requestId;
          const res = await fetchJson(API_BASE + `/library/videos/${encodeURIComponent(videoAssetId)}/lyrics/auto-generate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json; charset=utf-8' },
            body: JSON.stringify(reqBody),
          });
          const lines = (res.import && res.import.lines && Array.isArray(res.import.lines)) ? res.import.lines.length : 0;
          msg.textContent = `Auto lyrics completed: ${lines} lines.`;
          msg.className = 'ok';
          showAutoInfo(res);
          savePrefs();
          await refresh();
        } catch (e) {
          msg.textContent = 'Auto-generate failed: ' + e.message;
          msg.className = 'err';
        } finally {
          autoInFlight = false;
          setAutoUiState();
        }
      }

      async function retryAutoGenerateLyrics() {
        const msg = document.getElementById('msg');
        const payload = window.__lastAutoPayload;
        if (!payload || !payload.video_asset_id) {
          msg.textContent = 'Retry failed: no previous auto-generate payload found.';
          msg.className = 'err';
          return;
        }
        msg.textContent = 'Retrying auto-generate...';
        msg.className = 'muted';
        autoInFlight = true;
        setAutoUiState();
        try {
          const requestId = newRequestId();
          window.__lastAutoPayload.request_id = requestId;
          document.getElementById('autoRequestId').textContent = requestId;
          const res = await fetchJson(API_BASE + `/library/videos/${encodeURIComponent(payload.video_asset_id)}/lyrics/auto-generate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json; charset=utf-8' },
            body: JSON.stringify({
              request_id: requestId,
              video_relative_path: payload.video_relative_path,
              model: payload.model,
              language: payload.language,
              beam_size: payload.beam_size,
              vad_filter: payload.vad_filter,
            }),
          });
          const lines = (res.import && res.import.lines && Array.isArray(res.import.lines)) ? res.import.lines.length : 0;
          msg.textContent = `Retry auto lyrics completed: ${lines} lines.`;
          msg.className = 'ok';
          showAutoInfo(res);
          await refresh();
        } catch (e) {
          msg.textContent = 'Retry failed: ' + e.message;
          msg.className = 'err';
        } finally {
          autoInFlight = false;
          setAutoUiState();
        }
      }

      async function cancelAutoGenerateLyrics() {
        const msg = document.getElementById('msg');
        const payload = window.__lastAutoPayload;
        const requestId = payload && payload.request_id ? String(payload.request_id) : '';
        if (!requestId || !payload.video_asset_id) {
          msg.textContent = 'Cancel failed: no in-flight request_id found.';
          msg.className = 'err';
          return;
        }
        try {
          await fetchJson(API_BASE + `/library/videos/${encodeURIComponent(payload.video_asset_id)}/lyrics/auto-generate/cancel`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json; charset=utf-8' },
            body: JSON.stringify({ request_id: requestId }),
          });
          msg.textContent = `Cancel requested for ${requestId}.`;
          msg.className = 'ok';
        } catch (e) {
          msg.textContent = 'Cancel failed: ' + e.message;
          msg.className = 'err';
        }
      }

      window.__copyJson = async function(jobId, kind, encoded) {
        const msg = document.getElementById('msg');
        try {
          const raw = String(encoded || '')
            .replaceAll('&quot;', '"')
            .replaceAll('&#39;', "'")
            .replaceAll('&lt;', '<')
            .replaceAll('&gt;', '>')
            .replaceAll('&amp;', '&');
          const pretty = JSON.stringify(JSON.parse(raw), null, 2);
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(pretty);
          } else {
            throw new Error('clipboard API unavailable');
          }
          msg.textContent = `Copied ${kind} error JSON for ${shortId(jobId)}.`;
          msg.className = 'ok';
        } catch (e) {
          msg.textContent = 'Copy failed: ' + (e && e.message ? e.message : String(e));
          msg.className = 'err';
        }
      };

      document.getElementById('btnRefresh').addEventListener('click', refresh);
      document.getElementById('fStatus').addEventListener('change', () => { savePrefs(); refresh(); });
      document.getElementById('fAutoPoll').addEventListener('change', setupAutoRefresh);
      document.getElementById('fVideoAssetId').addEventListener('input', savePrefs);
      document.getElementById('fWordsPath').addEventListener('input', savePrefs);
      document.getElementById('fVideoPath').addEventListener('input', savePrefs);
      document.getElementById('fAsrQuality').addEventListener('change', savePrefs);
      document.getElementById('fAsrModel').addEventListener('input', savePrefs);
      document.getElementById('fAsrLanguage').addEventListener('input', savePrefs);
      document.getElementById('btnAutoLyrics').addEventListener('click', autoGenerateLyrics);
      document.getElementById('btnRetryAutoLyrics').addEventListener('click', retryAutoGenerateLyrics);
      document.getElementById('btnCancelAutoLyrics').addEventListener('click', cancelAutoGenerateLyrics);
      document.getElementById('btnCreateJob').addEventListener('click', createJob);
      applyPrefs();
      setAutoUiState();
      setupAutoRefresh();
      refresh();
    </script>
  </body>
</html>
